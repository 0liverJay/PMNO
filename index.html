<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thai Consonant Drill</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .card,
    .quiz,
    .result {
      width: 100%;
      max-width: 680px;
      background: #f3f3f3;
      border: 1px solid #e1e1e1;
      border-radius: 18px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      text-align: center;
      padding: 42px 32px;
    }

    .card h1,
    .quiz h2,
    .result h2 {
      margin: 0;
      font-weight: 700;
    }

    .card h1 {
      font-size: 2.1rem;
    }

    .subtitle {
      margin: 14px 0 28px;
      font-size: 1.1rem;
    }

    .nickname-input {
      width: 100%;
      max-width: 430px;
      padding: 14px 12px;
      font-size: 1.2rem;
      border: 3px solid #222;
      border-radius: 4px;
      outline: none;
      background: #fff;
    }

    .start-btn,
    .next-btn,
    .restart-btn {
      margin-top: 22px;
      padding: 14px 30px;
      font-size: 1.15rem;
      border: none;
      border-radius: 12px;
      background: #0d7cff;
      color: #fff;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .start-btn:hover,
    .next-btn:hover,
    .restart-btn:hover {
      background: #056de0;
    }

    .error-text {
      min-height: 22px;
      margin-top: 14px;
      color: #c62828;
      font-size: 0.95rem;
    }

    .hidden {
      display: none;
    }

    .player-name {
      margin: 0;
      font-size: 2rem;
      font-weight: 500;
    }

    .player-starts {
      margin: 8px 0 10px;
      font-size: 1.15rem;
    }

    .hearts {
      margin: 0 0 10px;
      font-size: 2rem;
      letter-spacing: 4px;
      min-height: 40px;
    }

    .remaining {
      margin: 0 0 28px;
      font-size: 1.1rem;
    }

    .quiz h2 {
      margin-bottom: 28px;
      font-size: 2rem;
    }

    .question-card {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 170px;
      margin-bottom: 24px;
    }

    .thai-letter {
      font-size: 7rem;
      line-height: 1;
      font-family: "Times New Roman", serif;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .choice-btn {
      width: 100%;
      padding: 18px 16px;
      border: none;
      border-radius: 8px;
      background: #dfe3e6;
      font-size: 1.08rem;
      cursor: pointer;
      transition: 0.15s ease;
      color: #111;
    }

    .choice-btn:hover {
      background: #cfd6da;
    }

    .choice-btn.correct {
      background: #bfe7c2;
    }

    .choice-btn.wrong {
      background: #f3c1c1;
    }

    .feedback {
      min-height: 28px;
      margin-top: 18px;
      font-size: 1rem;
      font-weight: 600;
    }

    .summary {
      margin-top: 18px;
      font-size: 1.1rem;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .card,
      .quiz,
      .result {
        padding: 28px 18px;
      }

      .card h1 {
        font-size: 1.7rem;
      }

      .thai-letter {
        font-size: 5.2rem;
      }

      .quiz h2,
      .result h2 {
        font-size: 1.7rem;
      }

      .choice-btn {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section id="welcome-screen" class="card">
      <h1>CSII Team X presents</h1>
      <p class="subtitle">Thai Consonants</p>

      <input
        id="nickname-input"
        class="nickname-input"
        type="text"
        placeholder="Enter your nickname"
        maxlength="30"
      />

      <button id="start-btn" class="start-btn">Start Quiz</button>
      <p id="welcome-error" class="error-text"></p>
    </section>

    <section id="quiz-screen" class="quiz hidden">
      <p id="player-name" class="player-name">marko</p>
      <p id="player-starts" class="player-starts">Starts: 0</p>
      <div id="hearts" class="hearts">❤️❤️❤️</div>
      <p class="remaining">Remaining: <span id="remaining-count">44</span></p>

      <h2>Thai Consonant Drill</h2>

      <div class="question-card">
        <div id="thai-letter" class="thai-letter">ก</div>
      </div>

      <div id="choices" class="choices"></div>

      <p id="feedback" class="feedback"></p>
      <button id="next-btn" class="next-btn hidden">Next</button>
    </section>

    <section id="result-screen" class="result hidden">
      <h2 id="result-title">Quiz Complete</h2>
      <p id="result-name" class="player-name"></p>
      <p id="result-starts" class="player-starts"></p>
      <p id="result-score" class="summary"></p>
      <button id="restart-btn" class="restart-btn">Play Again</button>
    </section>
  </main>

  <script>
    const welcomeScreen = document.getElementById("welcome-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");

    const nicknameInput = document.getElementById("nickname-input");
    const startBtn = document.getElementById("start-btn");
    const nextBtn = document.getElementById("next-btn");
    const restartBtn = document.getElementById("restart-btn");

    const welcomeError = document.getElementById("welcome-error");
    const playerName = document.getElementById("player-name");
    const playerStarts = document.getElementById("player-starts");
    const heartsEl = document.getElementById("hearts");
    const remainingCount = document.getElementById("remaining-count");
    const thaiLetter = document.getElementById("thai-letter");
    const choicesContainer = document.getElementById("choices");
    const feedback = document.getElementById("feedback");

    const resultTitle = document.getElementById("result-title");
    const resultName = document.getElementById("result-name");
    const resultStarts = document.getElementById("result-starts");
    const resultScore = document.getElementById("result-score");

    const thaiConsonants = [
      { letter: "ก", name: "ko kai", className: "Middle" },
      { letter: "ข", name: "kho khai", className: "High" },
      { letter: "ฃ", name: "kho khuat", className: "High" },
      { letter: "ค", name: "kho khwai", className: "Low" },
      { letter: "ฅ", name: "kho khon", className: "Low" },
      { letter: "ฆ", name: "kho ra-khang", className: "Low" },
      { letter: "ง", name: "ngo ngu", className: "Low" },
      { letter: "จ", name: "cho chan", className: "Middle" },
      { letter: "ฉ", name: "cho ching", className: "High" },
      { letter: "ช", name: "cho chang", className: "Low" },
      { letter: "ซ", name: "so so", className: "Low" },
      { letter: "ฌ", name: "cho choe", className: "Low" },
      { letter: "ญ", name: "yo ying", className: "Low" },
      { letter: "ฎ", name: "do cha-da", className: "Middle" },
      { letter: "ฏ", name: "to pa-tak", className: "Middle" },
      { letter: "ฐ", name: "tho than", className: "High" },
      { letter: "ฑ", name: "tho montho", className: "Low" },
      { letter: "ฒ", name: "tho phu-thao", className: "Low" },
      { letter: "ณ", name: "no nen", className: "Low" },
      { letter: "ด", name: "do dek", className: "Middle" },
      { letter: "ต", name: "to tao", className: "Middle" },
      { letter: "ถ", name: "tho thung", className: "High" },
      { letter: "ท", name: "tho thahan", className: "Low" },
      { letter: "ธ", name: "tho thong", className: "Low" },
      { letter: "น", name: "no nu", className: "Low" },
      { letter: "บ", name: "bo baimai", className: "Middle" },
      { letter: "ป", name: "po pla", className: "Middle" },
      { letter: "ผ", name: "pho phueng", className: "High" },
      { letter: "ฝ", name: "fo fa", className: "High" },
      { letter: "พ", name: "pho phan", className: "Low" },
      { letter: "ฟ", name: "fo fan", className: "Low" },
      { letter: "ภ", name: "pho sam-phao", className: "Low" },
      { letter: "ม", name: "mo ma", className: "Low" },
      { letter: "ย", name: "yo yak", className: "Low" },
      { letter: "ร", name: "ro ruea", className: "Low" },
      { letter: "ล", name: "lo ling", className: "Low" },
      { letter: "ว", name: "wo waen", className: "Low" },
      { letter: "ศ", name: "so sala", className: "High" },
      { letter: "ษ", name: "so rue-si", className: "High" },
      { letter: "ส", name: "so suea", className: "High" },
      { letter: "ห", name: "ho hip", className: "High" },
      { letter: "ฬ", name: "lo chu-la", className: "Low" },
      { letter: "อ", name: "o ang", className: "Middle" },
      { letter: "ฮ", name: "ho nok-huk", className: "Low" }
    ];

    let quizData = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let lives = 3;
    let starts = 0;
    let nickname = "";
    let answeredCurrent = false;
    let gameOver = false;

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function buildQuestionSet() {
      return shuffle(thaiConsonants).map((item) => {
        const correctText = `${item.name} — ${item.className}`;

        const wrongPool = thaiConsonants
          .filter((x) => x.letter !== item.letter)
          .map((x) => `${x.name} — ${x.className}`);

        const wrongChoices = shuffle(wrongPool).slice(0, 2);

        return {
          letter: item.letter,
          correct: correctText,
          choices: shuffle([correctText, ...wrongChoices])
        };
      });
    }

    function updateHearts() {
      heartsEl.textContent = "❤️".repeat(lives);
    }

    function renderQuestion() {
      const current = quizData[currentQuestionIndex];
      thaiLetter.textContent = current.letter;
      remainingCount.textContent = quizData.length - currentQuestionIndex;
      feedback.textContent = "";
      nextBtn.classList.add("hidden");
      answeredCurrent = false;
      choicesContainer.innerHTML = "";

      current.choices.forEach((choiceText) => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choiceText;
        btn.addEventListener("click", () => handleAnswer(btn, choiceText, current.correct));
        choicesContainer.appendChild(btn);
      });
    }

    function handleAnswer(button, selected, correct) {
      if (answeredCurrent || gameOver) return;
      answeredCurrent = true;

      const allButtons = document.querySelectorAll(".choice-btn");
      allButtons.forEach((btn) => {
        btn.disabled = true;
      });

      if (selected === correct) {
        button.classList.add("correct");
        feedback.textContent = "Correct";
        score++;
      } else {
        button.classList.add("wrong");
        feedback.textContent = "Incorrect. Correct answer: " + correct;
        lives--;
        updateHearts();

        allButtons.forEach((btn) => {
          if (btn.textContent === correct) {
            btn.classList.add("correct");
          }
        });
      }

      if (lives <= 0) {
        gameOver = true;
        nextBtn.textContent = "See Result";
      } else if (currentQuestionIndex >= quizData.length - 1) {
        nextBtn.textContent = "See Result";
      } else {
        nextBtn.textContent = "Next";
      }

      nextBtn.classList.remove("hidden");
    }

    function showResults() {
      welcomeScreen.classList.add("hidden");
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      resultTitle.textContent = lives > 0 ? "Quiz Complete" : "Game Over";
      resultName.textContent = nickname;
      resultStarts.textContent = "Starts: " + starts;
      resultScore.textContent =
        "Score: " + score + " / " + quizData.length +
        " | Hearts left: " + lives + " / 3";
    }

    function goNext() {
      if (gameOver) {
        showResults();
        return;
      }

      currentQuestionIndex++;

      if (currentQuestionIndex >= quizData.length) {
        showResults();
        return;
      }

      renderQuestion();
    }

    function startQuiz() {
      welcomeError.textContent = "";
      nickname = nicknameInput.value.trim();

      if (!nickname) {
        welcomeError.textContent = "Please enter your nickname first.";
        return;
      }

      const localKey = "starts_" + nickname;
      const previous = Number(localStorage.getItem(localKey) || "0");
      starts = previous + 1;
      localStorage.setItem(localKey, String(starts));

      quizData = buildQuestionSet();
      currentQuestionIndex = 0;
      score = 0;
      lives = 3;
      gameOver = false;

      playerName.textContent = nickname;
      playerStarts.textContent = "Starts: " + starts;
      updateHearts();

      welcomeScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");

      renderQuestion();
    }

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", goNext);
    restartBtn.addEventListener("click", startQuiz);

    nicknameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startQuiz();
      }
    });
  </script>
</body>
</html>
